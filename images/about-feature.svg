<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#ffe4e4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5050"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="darkCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1f2e"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(40,0,0,0.2)"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#fbg)"/>
  <circle cx="700" cy="80" r="180" fill="rgba(204,0,0,0.06)"/>
  <circle cx="80" cy="520" r="220" fill="rgba(204,0,0,0.06)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="80" width="560" height="440" rx="20" fill="url(#card)"/>
  </g>

  <g>
    <rect x="120" y="80" width="560" height="60" rx="20" fill="url(#redGrad)"/>
    <path d="M120,140 L680,140 L680,80 L120,80 Z" fill="url(#redGrad)" opacity="0"/>
    <circle cx="150" cy="110" r="6" fill="#fff" opacity="0.8"/>
    <circle cx="172" cy="110" r="6" fill="#fff" opacity="0.6"/>
    <circle cx="194" cy="110" r="6" fill="#fff" opacity="0.4"/>
    <text x="660" y="116" text-anchor="end" font-family="Consolas,monospace" font-size="14" fill="rgba(255,255,255,0.85)">tongyuan.lab</text>
  </g>

  <g transform="translate(160,180)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#fff" stroke="#fde0e0"/>
    <circle cx="40" cy="40" r="22" fill="rgba(204,0,0,0.1)"/>
    <circle cx="40" cy="40" r="14" fill="none" stroke="#cc0000" stroke-width="2.5"/>
    <line x1="40" y1="40" x2="55" y2="55" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="80" y="28" width="120" height="10" rx="3" fill="#1a1a1a"/>
    <rect x="80" y="46" width="90" height="6" rx="2" fill="#cccccc"/>
    <rect x="0" y="76" width="220" height="44" rx="0 0 10 10" fill="#fafafa"/>
    <rect x="20" y="92" width="60" height="6" rx="2" fill="#cc0000"/>
    <rect x="20" y="104" width="100" height="4" rx="2" fill="#dddddd"/>
  </g>

  <g transform="translate(400,180)">
    <rect x="0" y="0" width="240" height="120" rx="10" fill="url(#darkCard)"/>
    <circle cx="20" cy="20" r="4" fill="#ff5f56"/>
    <circle cx="34" cy="20" r="4" fill="#ffbd2e"/>
    <circle cx="48" cy="20" r="4" fill="#27c93f"/>
    <text x="20" y="56" font-family="Consolas,monospace" font-size="11" fill="#4ec9b0">$ ./run_pipeline.sh</text>
    <text x="20" y="74" font-family="Consolas,monospace" font-size="11" fill="#6a9955"># FastQC: 100%</text>
    <text x="20" y="90" font-family="Consolas,monospace" font-size="11" fill="#6a9955"># BWA align: 100%</text>
    <text x="20" y="106" font-family="Consolas,monospace" font-size="11" fill="#dcdcaa">[OK] All steps done.</text>
  </g>

  <g transform="translate(160,320)">
    <rect x="0" y="0" width="480" height="160" rx="10" fill="#fff" stroke="#fde0e0"/>
    <text x="20" y="32" font-family="Arial,sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">Coverage by chromosome</text>
    <g transform="translate(20,52)">
      <rect x="0" y="60" width="30" height="48" rx="3" fill="url(#redGrad)"/>
      <rect x="40" y="40" width="30" height="68" rx="3" fill="url(#redGrad)" opacity="0.85"/>
      <rect x="80" y="20" width="30" height="88" rx="3" fill="url(#redGrad)"/>
      <rect x="120" y="50" width="30" height="58" rx="3" fill="url(#redGrad)" opacity="0.7"/>
      <rect x="160" y="10" width="30" height="98" rx="3" fill="url(#redGrad)"/>
      <rect x="200" y="32" width="30" height="76" rx="3" fill="url(#redGrad)" opacity="0.85"/>
      <rect x="240" y="55" width="30" height="53" rx="3" fill="url(#redGrad)" opacity="0.7"/>
      <rect x="280" y="20" width="30" height="88" rx="3" fill="url(#redGrad)"/>
      <rect x="320" y="44" width="30" height="64" rx="3" fill="url(#redGrad)" opacity="0.85"/>
      <rect x="360" y="32" width="30" height="76" rx="3" fill="url(#redGrad)"/>
      <rect x="400" y="55" width="30" height="53" rx="3" fill="url(#redGrad)" opacity="0.7"/>
    </g>
    <line x1="20" y1="160" x2="460" y2="160" stroke="#eeeeee"/>
  </g>

  <g opacity="0.85" transform="translate(700,360)">
    <g stroke="#cc0000" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M-20,-80 C40,-40 40,0 -20,40 C40,80 40,120 -20,160"/>
      <path d="M40,-80 C-20,-40 -20,0 40,40 C-20,80 -20,120 40,160" opacity="0.6"/>
      <line x1="-10" y1="-60" x2="30" y2="-60"/>
      <line x1="-10" y1="-20" x2="30" y2="-20"/>
      <line x1="-10" y1="20" x2="30" y2="20"/>
      <line x1="-10" y1="60" x2="30" y2="60"/>
      <line x1="-10" y1="100" x2="30" y2="100"/>
      <line x1="-10" y1="140" x2="30" y2="140"/>
    </g>
  </g>
</svg>
