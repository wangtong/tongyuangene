<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgDna" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbe9e9"/>
      <stop offset="100%" stop-color="#fff5f5"/>
    </linearGradient>
    <linearGradient id="strandA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#ee0000"/>
    </linearGradient>
    <linearGradient id="strandB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00a896"/>
      <stop offset="100%" stop-color="#02c39a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bgDna)"/>

  <!-- �o�&� -->
  <g font-family="Consolas, monospace" font-size="11" fill="#cc0000" opacity="0.07">
    <text x="40" y="60">ATCG GCTA</text>
    <text x="450" y="100">TAGC CGAT</text>
    <text x="50" y="380">CGTA ATGC</text>
    <text x="430" y="400">GATC TCGA</text>
    <text x="240" y="40">{ "seq": "ATCG..." }</text>
    <text x="220" y="430">analyze --threads 16</text>
  </g>

  <!-- DNA ̺� -->
  <g transform="translate(300,225)">
    <g>
      <!-- � A -->
      <path d="M -120,-180 Q 0,-140 120,-100 Q 0,-60 -120,-20 Q 0,20 120,60 Q 0,100 -120,140 Q 0,180 120,220"
            stroke="url(#strandA)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- � B -->
      <path d="M 120,-180 Q 0,-140 -120,-100 Q 0,-60 120,-20 Q 0,20 -120,60 Q 0,100 120,140 Q 0,180 -120,220"
            stroke="url(#strandB)" stroke-width="6" fill="none" stroke-linecap="round"/>

      <!-- ��� -->
      <line x1="-110" y1="-160" x2="110" y2="-160" stroke="#aaa" stroke-width="2"/>
      <line x1="-100" y1="-120" x2="100" y2="-120" stroke="#aaa" stroke-width="2"/>
      <line x1="-80" y1="-80" x2="80" y2="-80" stroke="#aaa" stroke-width="2"/>
      <line x1="-60" y1="-40" x2="60" y2="-40" stroke="#aaa" stroke-width="2"/>
      <line x1="-80" y1="0" x2="80" y2="0" stroke="#aaa" stroke-width="2"/>
      <line x1="-100" y1="40" x2="100" y2="40" stroke="#aaa" stroke-width="2"/>
      <line x1="-110" y1="80" x2="110" y2="80" stroke="#aaa" stroke-width="2"/>
      <line x1="-100" y1="120" x2="100" y2="120" stroke="#aaa" stroke-width="2"/>
      <line x1="-80" y1="160" x2="80" y2="160" stroke="#aaa" stroke-width="2"/>
      <line x1="-60" y1="200" x2="60" y2="200" stroke="#aaa" stroke-width="2"/>

      <!-- �� -->
      <g fill="#cc0000">
        <circle cx="-120" cy="-180" r="6"/><circle cx="-120" cy="-20" r="6"/>
        <circle cx="-120" cy="140" r="6"/>
        <circle cx="120" cy="-100" r="6"/><circle cx="120" cy="60" r="6"/>
        <circle cx="120" cy="220" r="6"/>
      </g>
      <g fill="#00a896">
        <circle cx="120" cy="-180" r="6"/><circle cx="120" cy="-20" r="6"/>
        <circle cx="120" cy="140" r="6"/>
        <circle cx="-120" cy="-100" r="6"/><circle cx="-120" cy="60" r="6"/>
        <circle cx="-120" cy="220" r="6"/>
      </g>
    </g>
  </g>
</svg>
